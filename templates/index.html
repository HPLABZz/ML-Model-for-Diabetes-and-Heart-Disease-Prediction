<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>AI Disease Prediction System</title>
    <style>

    * {box-sizing: border-box;}
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #eef2f7, #dfe7f5);
        margin: 0;
        padding: 0;
    }
    .navbar {
        width: 100%;
        background: linear-gradient(135deg, #4f6df5, #6c8cff);
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        position: fixed;
        top: 0;
        z-index: 1000;
    }
    .nav-title {color: white; font-size: 20px; font-weight: 600;}
    .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 15px;
        margin-left: 10px;
        padding: 6px 12px;
        border-radius: 8px;
        transition: 0.3s;
    }
    .nav-links a:hover {background: rgba(255,255,255,0.2);}
    .container {
        width: 60%;
        margin: auto;
        margin-top: 110px;
        background: rgba(255,255,255,0.95);
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        text-align: center;
    }
    .title {
        font-size: 24px;  font-weight: 600;
        color: #2c3e50; margin-bottom: 15px;
    }
    .instructions {
        background: #f1f5ff;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        color: #444;
        margin-bottom: 40px;
    }
    textarea {
        width: 100%;     height: 80px;  padding: 12px;
        font-size: 14px; transition: 0.3s;
        border-radius: 10px; border: 1px solid #dcdcdc;
    }

    textarea:focus {
        border: 1px solid #4f6df5;
        box-shadow: 0 0 10px rgba(79,109,245,0.25);
        outline: none;
    }
    .controls {display: flex; gap: 10px; margin-top: 15px;}
    select {flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ccc;}
    button {flex: 1;     padding: 12px;
        font-size: 15px; color: white;
        border: none;    border-radius: 10px;
        cursor: pointer; transition: 0.3s;
        background: linear-gradient(135deg, #4f6df5, #6c8cff);
    }
    button:hover {transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .toast {
        position: fixed;
        top: 60px;
        left: 50%;
        transform: translate(-50%, -40px);
        min-width: 300px;
        max-width: 90%;
        padding: 14px;
        border-radius: 10px;
        color: white;
        font-size: 14px;
        background: #e74c3c;
        opacity: 0;
        transition: 0.4s;
        z-index: 9999;
    }
    .toast.show {opacity: 1; transform: translate(-50%, 0);}
    .toast.success { background: #2ecc71; }
    .toast.error { background: #e74c3c; }
    .modal {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
    }
    .modal-box {
        background: white;
        width: 300px;
        padding: 25px;
        margin: 120px auto;
        border-radius: 12px;
        text-align: center;
    }

    .modal-box input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .footer {
        color: yellow;
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        background: linear-gradient(135deg, #4f6df5d3, #6c8cffd0);
        font-size: 18px;
        font-weight: 600;
        margin-top: 20px;
    }

    @media (max-width: 768px) {
        .navbar {flex-direction: column; align-items: flex-start; }
        .nav-title {font-size: 18px; margin-bottom: 5px; }
        .nav-links {width: 100%; display: flex; justify-content: space-between;}
        .container {width: 92%; padding: 20px; border-radius: 16px;}
        .title {font-size: 18px;}
        textarea {height: 90px;}
        .controls {flex-direction: column;}
        button {width: 100%;}
        select {width: 100%;}
    }
    @media (max-width: 768px) {
        .footer {font-size: 12px; padding: 10px;}
    }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="nav-title">AI Health Prediction System</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#" onclick="openLogin()">History</a>
        </div>
    </div>

    <div id="loginModal" class="modal">
    <div class="modal-box">
        <form action="/admin_login" method="post">
            <h2>Admin Login</h2>

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <span class="close" onclick="closeLogin()">×</span>
    </div>
</div>

    <div id="toast" class="toast"></div>
    <div class="container">
        <div class="title">Diabetes and Heart Disease Risk Prediction model</div>
        <div class="subtitle"></div>
        <div class="instructions">Enter <b>36 comma-separated values</b> including <b>patient_id</b> and medical features.</div>
        <form id="predictionForm" action="/predict" method="post">
            <textarea id="patientInput" name="patient_data"
                placeholder="Example:861,1.004,0.006,1.006,0.995,..."></textarea>

            <div class="controls">
                <select>
                    <option disabled selected>Feature Order</option>
                    <option>1. Patient id</option>
                    <option>2. Age</option>
                    <option>3. Sex</option>
                    <option>4. Smoking</option>
                    <option>5. Alcohol Consumption</option>
                    <option>6. Physical Activity</option>
                    <option>7. Obesity</option>
                    <option>8. Radiation Exposure</option>
                    <option>9. Blood pressure</option>
                    <option>10. Cholesterol</option>
                    <option>11. Blood Sugar</option>
                    <option>12. Bmi</option>
                    <option>13. Resting HeartRate</option>
                    <option>14. ECG Results</option>
                    <option>15. Exercise Induced Angina</option>
                    <option>16. C Reactive Protein</option>
                    <option>17. Triglycerides</option>
                    <option>18. Ldl</option>
                    <option>19. Hdl</option>
                    <option>20. PSA Level</option>
                    <option>21. ca125 Level</option>
                    <option>22. afp Level</option>
                    <option>23. cea Level</option>
                    <option>24. BRCA1 Mutation</option>
                    <option>25. BRCA2 Mutation</option>
                    <option>26. TP53 Mutation</option>
                    <option>27. KRAS Mutation</option>
                    <option>28. EGFR Mutation</option>
                    <option>29. LDLR Variant</option>
                    <option>30. APOE Variant</option>
                    <option>31. MYH7 Variant</option>
                    <option>32. PCSK9 Variant</option>
                    <option>33. snp Risk Score</option>
                    <option>34. Gene Expression Score</option>
                    <option>35. Polygenic Risk Score</option>
                    <option>36. Family History Heart</option>
                </select>
                <button class="predict_btn" type="submit">Predict Risk</button>
            </div>
        </form>
        <form action="/admin_login" method="post"></form>
    </div>
    </div>

    <footer class="footer">
        <p>© 2026 AI Health Prediction System | Developed by HPLABZz</p>
    </footer>

</body>
    <script>
        function showToast(message, type="error") {
            let toast = document.getElementById("toast");
            clearTimeout(toast.hideTimeout);
            toast.classList.remove("show");

            setTimeout(() => {
                void toast.offsetWidth;
                toast.innerText = message;
                toast.className = "toast " + type + " show";

                toast.hideTimeout = setTimeout(() => {
                    toast.classList.remove("show");
                }, 1500);
            }, 50);
        }

        function openLogin() {
            document.getElementById("loginModal").style.display = "block";
        }

        function closeLogin() {
            document.getElementById("loginModal").style.display = "none";
        }

        document.getElementById("predictionForm").addEventListener("submit", function(e) {
            let input = document.getElementById("patientInput").value.trim();
            let values = input.split(",").filter(v => v.trim() !== "");

            if (values.length !== 36) {
                e.preventDefault();
                showToast("Enter exactly 36 values. You entered: " + values.length, "error");
                return;
            }

            for (let i = 0; i < values.length; i++) {
                if (isNaN(values[i])) {
                    e.preventDefault();
                    showToast("Invalid value at position " + (i+1), "error");
                    return;
                }
            }

            showToast("Processing prediction...", "success");
        });
        </script>
</body>
</html>
